# Loaded via `cargo --config @.cargo/flamegraph.toml`.
# Like profiling.toml but keeps full production optimisation. Line-table debug
# info is enough for flamegraph symbol resolution; skips the strip step.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "link-arg=-fuse-ld=lld",
  "-C", "link-arg=-Wl,--gc-sections",
]

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "target-feature=+crt-static",
  "-C", "link-arg=-fuse-ld=lld",
  "-C", "link-arg=-Wl,--gc-sections",
]

[target.x86_64-apple-darwin]
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "link-arg=-mmacosx-version-min=11.0",
]

[target.aarch64-apple-darwin]
rustflags = [
  "-C", "target-cpu=apple-m1",
  "-C", "link-arg=-mmacosx-version-min=11.0",
]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "target-feature=+crt-static",
]
