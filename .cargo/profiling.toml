# Loaded via `cargo --config @.cargo/profiling.toml`.
# Overrides `.cargo/config.toml` target rustflags to keep debug info + drop the
# strip/dead-strip linker flags that erase symbols samply/perf need.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "link-arg=-fuse-ld=lld",
  "-C", "force-frame-pointers=yes",
]

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "target-feature=+crt-static",
  "-C", "link-arg=-fuse-ld=lld",
  "-C", "force-frame-pointers=yes",
]

[target.x86_64-apple-darwin]
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "link-arg=-mmacosx-version-min=11.0",
  "-C", "force-frame-pointers=yes",
]

[target.aarch64-apple-darwin]
rustflags = [
  "-C", "target-cpu=apple-m1",
  "-C", "link-arg=-mmacosx-version-min=11.0",
  "-C", "force-frame-pointers=yes",
]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
rustflags = [
  "-C", "target-cpu=x86-64-v3",
  "-C", "target-feature=+crt-static",
  "-C", "force-frame-pointers=yes",
]
